server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API Proxy ─────────────────────────────────────────────────────────────
    # All /api/* requests are forwarded to the Express backend.
    # ${BACKEND_URL} is replaced at container startup by docker-entrypoint.sh.
    #   Local Docker Compose:  http://server:3001
    #   Railway:               http://server.railway.internal:3001
    #
    # NOTE: proxy_pass without a trailing slash means the full /api/... path
    # is preserved when forwarded to the upstream server.
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;

        # Required when proxy_pass target is https:// — sends correct hostname
        # in the SSL handshake so Railway's edge accepts the connection.
        proxy_ssl_server_name on;

        # ── SSE (Server-Sent Events) support ──────────────────────────────────
        # Required for streaming chat and agent mode.
        # Disabling buffering ensures chunks arrive at the browser in real time.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # When proxying to an external HTTPS server (Railway's public URL),
        # the Host header must match the upstream's domain, not the frontend's domain.
        # $proxy_host = the hostname from proxy_pass (e.g. server-xxx.up.railway.app)
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 5 minutes — allows long agent runs without Nginx killing the connection
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── React SPA ─────────────────────────────────────────────────────────────
    # Serve index.html for any path that doesn't match a static file.
    # This lets React Router handle /workspace/default, /settings/llm, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
